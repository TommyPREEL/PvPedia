name: Docker Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          command_timeout: 5m
          envs: GHCR_ACTOR,GHCR_TOKEN,SERVER_IMAGE,CLIENT_IMAGE,DEPLOY_PATH
          script: |
            [ -f /etc/profile ] && . /etc/profile
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc
            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            cat > .env <<EOF
            SERVER_IMAGE=$SERVER_IMAGE
            CLIENT_IMAGE=$CLIENT_IMAGE
            EOF
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_IMAGE: ghcr.io/${{ env.REPO_LOWER }}/server:latest
          CLIENT_IMAGE: ghcr.io/${{ env.REPO_LOWER }}/client:latest
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
